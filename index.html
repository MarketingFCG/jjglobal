<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JJ Global Landing Page">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald&family=Source+Sans+3:wght@400;700&display=swap">
    <title>JJ Global Landing Page</title>
    <style>
        body { font-family: 'Source Sans 3', sans-serif; color: #fff; background-color: #1c1c1c; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; }
        nav { background: navy; padding: 10px; }
        nav ul { list-style: none; display: flex; justify-content: space-around; }
        nav ul li { padding: 10px; }
        .hero { background: url('globe.png') no-repeat center; height: 400px; display: flex; align-items: center; justify-content: center; position: relative; }
        .stats-bar { display: flex; justify-content: space-around; margin: 20px 0; }
        .card { background: #333; padding: 20px; margin: 10px; border-radius: 5px; }
        footer { background: navy; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>Services</li>
            <li>Contact</li>
        </ul>
    </nav>
    <section class="hero">
        <h1>Welcome to JJ Global</h1>
    </section>
    <section class="stats-bar">
        <div class="stat">100+ Projects</div>
        <div class="stat">24/7 Support</div>
        <div class="stat">5 Star Rating</div>
    </section>
    <section class="why">
        <h2>Why Choose Us?</h2>
        <div class="card">Experienced Team</div>
        <div class="card">Global Reach</div>
        <div class="card">Customer Focused</div>
    </section>
    <section class="how-it-works">
        <h2>How It Works</h2>
        <p>Step by Step guide on our services.</p>
    </section>
    <section class="service-coverage">
        <h2>Our Coverage</h2>
        <p>Map and details of service areas.</p>
    </section>
    <section class="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <input type="submit" value="Submit">
        </form>
    </section>
    <footer>
        <p>&copy; 2026 JJ Global</p>
    </footer>
</body>
</html>
